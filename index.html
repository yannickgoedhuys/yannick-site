<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yannick Goedhuys — Data Engineer</title>
  <meta name="description" content="Personal website of Yannick Goedhuys, Data Engineer based in Belgium.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="hud-name">Yannick's Office</span>
      <span id="hud-hint">A/D to walk &bull; E to interact</span>
    </div>
    <canvas id="game"></canvas>
    <div id="dialog" class="hidden">
      <div id="dialog-title"></div>
      <div id="dialog-body"></div>
      <div id="dialog-hint">Press E or Escape to close</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
